name: Build Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "index.js"
      - "index.html"
      - "package.json"
      - ".github/workflows/build-docker-image.yml"

env:
  IMAGE_NAME: komari-agent

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set image tags
        run: |
          echo "IMAGE_TAG=ghcr.io/${IMAGE_OWNER}/${IMAGE_NAME}:latest" >> $GITHUB_ENV
          echo "IMAGE_TAG_SHA=ghcr.io/${IMAGE_OWNER}/${IMAGE_NAME}:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_TAG_SHA }}
